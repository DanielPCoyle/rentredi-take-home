name: Lighthouse

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Build frontend
        run: npm run web:build

      - name: Start application
        run: |
          OWM_MOCK=1 OWM_API_KEY=lighthouse-not-used DB_DRIVER=memory LOG_LEVEL=silent npm start > /tmp/rentredi.log 2>&1 &
          echo $! > /tmp/rentredi.pid

      - name: Wait for application
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8080/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/rentredi.log
          exit 1

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: http://127.0.0.1:8080/
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-server-log
          path: /tmp/rentredi.log
          if-no-files-found: ignore
          retention-days: 7
