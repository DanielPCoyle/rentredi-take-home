name: Dependency review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Review dependency changes
        id: dependency-review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Explain unavailable dependency review
        if: steps.dependency-review.outcome == 'failure'
        run: |
          echo "::warning::GitHub Dependency Review was unavailable or reported a problem."
          echo "Review the action log and Dependabot advisory details before merging."
