name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-coverage:
    name: Build, test & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install backend deps
        run: npm ci

      - name: Install web deps
        run: npm ci
        working-directory: web

      - name: Test + coverage (min 80% lines)
        run: >-
          npm run coverage --
          --coverage.thresholds.lines=80
          --coverage.thresholds.statements=80
          --coverage.thresholds.functions=80
          --coverage.thresholds.branches=65

      - name: Build web bundle
        run: npm run web:build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  secret-pii-scan:
    name: Secret / API-key / PII scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan for secrets & API keys
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan for PII (SSN patterns)
        run: |
          if git grep -nE '[0-9]{3}-[0-9]{2}-[0-9]{4}' -- ':!*package-lock.json' ':!.github/**'; then
            echo "::error::Possible SSN-formatted PII found above."
            exit 1
          fi
          echo "No SSN-formatted PII found."
