version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch
      backend-test-stack:
        patterns:
          - "vitest"
          - "@vitest/*"
        update-types:
          - major

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch
      react-runtime:
        patterns:
          - "react"
          - "react-dom"
        update-types:
          - major
      vite-toolchain:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"
          - "vite-plugin-pwa"
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/New_York
    open-pull-requests-limit: 5
