version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    # Major bumps landing unvalidated broke production: firebase-admin 12->14
    # removed the namespaced credential API and crashed the server at boot.
    # Majors are now a deliberate, manually-reviewed upgrade — dependabot only
    # proposes minor/patch; bump a major yourself when you've validated it.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/New_York
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/New_York
    open-pull-requests-limit: 5
