    <!-- Structured data for search + AI answer engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "RentRedi User Manager",
        "url": "https://rentredi-owm-only-production.up.railway.app/",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript",
        "description": "A user-management web app: create, read, update, and delete users, each enriched with city, state, and timezone, then plotted on an interactive 3D globe with day/night lighting.",
        "author": { "@type": "Person", "name": "Dan Coyle" }
      }
    </script>

    <script>
      // Set the theme before first paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "light" && t !== "dark") {
            t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
