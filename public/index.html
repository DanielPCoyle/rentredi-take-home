<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RentRedi Users</title>

    <!--
      No build step. ES modules + import map + htm (JSX-like tagged templates
      bound to React.createElement). The import map pins react/firebase/reactfire
      to a single instance each, which is what ReactFire's hooks/context need.
    -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom": "https://esm.sh/react-dom@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "htm": "https://esm.sh/htm@3.1.1",
          "firebase/app": "https://esm.sh/firebase@10.14.1/app",
          "firebase/database": "https://esm.sh/firebase@10.14.1/database",
          "firebase/auth": "https://esm.sh/firebase@10.14.1/auth",
          "firebase/firestore": "https://esm.sh/firebase@10.14.1/firestore",
          "firebase/storage": "https://esm.sh/firebase@10.14.1/storage",
          "firebase/functions": "https://esm.sh/firebase@10.14.1/functions",
          "firebase/analytics": "https://esm.sh/firebase@10.14.1/analytics",
          "firebase/performance": "https://esm.sh/firebase@10.14.1/performance",
          "firebase/remote-config": "https://esm.sh/firebase@10.14.1/remote-config",
          "firebase/messaging": "https://esm.sh/firebase@10.14.1/messaging",
          "firebase/app-check": "https://esm.sh/firebase@10.14.1/app-check",
          "reactfire": "https://esm.sh/reactfire@4.2.3?external=react,react-dom,firebase"
        }
      }
    </script>

    <style>
      :root {
        --bg: #0f172a; --card: #1e293b; --muted: #94a3b8; --text: #e2e8f0;
        --accent: #38bdf8; --danger: #f87171; --ok: #34d399; --border: #334155;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg); color: var(--text);
      }
      .wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px 64px; }
      header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      h1 { font-size: 1.6rem; margin: 0; }
      .badge { font-size: 0.75rem; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); }
      .badge.live { color: var(--ok); border-color: var(--ok); }
      form.create { display: grid; grid-template-columns: 2fr 1fr 0.8fr auto; gap: 10px; margin: 24px 0; }
      input {
        background: #0b1220; border: 1px solid var(--border); color: var(--text);
        padding: 10px 12px; border-radius: 8px; font-size: 0.95rem; width: 100%;
      }
      input:focus { outline: 2px solid var(--accent); border-color: transparent; }
      button {
        background: var(--accent); color: #04263a; border: none; padding: 10px 16px;
        border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem;
      }
      button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
      button.danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .error { background: #3b1113; border: 1px solid var(--danger); color: #fecaca; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
      .card h3 { margin: 0 0 4px; font-size: 1.1rem; }
      .card .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 12px; }
      .row { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 3px 0; }
      .row span:first-child { color: var(--muted); }
      .clock { font-variant-numeric: tabular-nums; color: var(--accent); font-weight: 600; }
      .actions { display: flex; gap: 8px; margin-top: 14px; }
      .actions button { flex: 1; padding: 8px; }
      .edit { display: grid; gap: 8px; }
      .empty { color: var(--muted); text-align: center; padding: 40px; }
      @media (max-width: 620px) { form.create { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      import React, { useState, useEffect, useCallback } from "react";
      import { createRoot } from "react-dom/client";
      import htm from "htm";

      const html = htm.bind(React.createElement);

      // --- helpers ---------------------------------------------------------

      async function api(method, path, body) {
        const res = await fetch(path, {
          method,
          headers: body ? { "Content-Type": "application/json" } : {},
          body: body ? JSON.stringify(body) : undefined,
        });
        let json = null;
        try { json = await res.json(); } catch { /* 204, etc. */ }
        if (!res.ok) {
          const err = new Error(json?.error?.message || `Request failed (${res.status})`);
          err.details = json?.error?.details;
          throw err;
        }
        return json;
      }

      function fmtOffset(sec) {
        const sign = sec < 0 ? "-" : "+";
        const abs = Math.abs(sec);
        const hh = String(Math.floor(abs / 3600)).padStart(2, "0");
        const mm = String(Math.floor((abs % 3600) / 60)).padStart(2, "0");
        return `UTC${sign}${hh}:${mm}`;
      }

      // Current wall-clock time at the user's location, from their stored UTC offset.
      function localTime(offsetSec) {
        const now = new Date();
        const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
        return new Date(utcMs + offsetSec * 1000);
      }

      // --- creative addition: a live, ticking local clock per user ---------
      function LocalClock({ offset }) {
        const [now, setNow] = useState(() => localTime(offset));
        useEffect(() => {
          const t = setInterval(() => setNow(localTime(offset)), 1000);
          return () => clearInterval(t);
        }, [offset]);
        return html`<span className="clock">${now.toLocaleTimeString([], {
          hour: "2-digit", minute: "2-digit", second: "2-digit",
        })}</span>`;
      }

      // --- shared UI (identical for live + polled data sources) ------------

      function UserCard({ user, onChanged }) {
        const [editing, setEditing] = useState(false);
        const [form, setForm] = useState({ name: user.name, zip: user.zip, country: user.country || "" });
        const [busy, setBusy] = useState(false);
        const [error, setError] = useState(null);

        async function save() {
          setBusy(true); setError(null);
          try {
            const patch = {};
            if (form.name !== user.name) patch.name = form.name;
            if (form.zip !== user.zip) patch.zip = form.zip;
            if ((form.country || "") !== (user.country || "")) patch.country = form.country || undefined;
            if (Object.keys(patch).length) await api("PUT", `/api/users/${user.id}`, patch);
            setEditing(false);
            onChanged();
          } catch (e) { setError(e.message); } finally { setBusy(false); }
        }

        async function remove() {
          setBusy(true); setError(null);
          try { await api("DELETE", `/api/users/${user.id}`); onChanged(); }
          catch (e) { setError(e.message); setBusy(false); }
        }

        if (editing) {
          return html`
            <div className="card">
              <h3>${user.name}</h3>
              <div className="sub">Editing</div>
              <div className="edit">
                <input value=${form.name} onChange=${(e) => setForm({ ...form, name: e.target.value })} placeholder="Name" />
                <input value=${form.zip} onChange=${(e) => setForm({ ...form, zip: e.target.value })} placeholder="ZIP" />
                <input value=${form.country} onChange=${(e) => setForm({ ...form, country: e.target.value })} placeholder="Country (optional)" />
                ${error && html`<div className="error">${error}</div>`}
                <div className="actions">
                  <button onClick=${save} disabled=${busy}>Save</button>
                  <button className="secondary" onClick=${() => setEditing(false)} disabled=${busy}>Cancel</button>
                </div>
              </div>
            </div>`;
        }

        return html`
          <div className="card">
            <h3>${user.name}</h3>
            <div className="sub">${user.city || "—"} · ${user.zip}${user.country ? `, ${user.country}` : ""}</div>
            <div className="row"><span>Local time</span><${LocalClock} offset=${user.timezone} /></div>
            <div className="row"><span>Timezone</span><span>${fmtOffset(user.timezone)}</span></div>
            <div className="row"><span>Latitude</span><span>${user.lat}</span></div>
            <div className="row"><span>Longitude</span><span>${user.lon}</span></div>
            ${error && html`<div className="error" style=${{ marginTop: "10px" }}>${error}</div>`}
            <div className="actions">
              <button className="secondary" onClick=${() => setEditing(true)} disabled=${busy}>Edit</button>
              <button className="danger" onClick=${remove} disabled=${busy}>Delete</button>
            </div>
          </div>`;
      }

      function UserManager({ users, source, onChanged }) {
        const [form, setForm] = useState({ name: "", zip: "", country: "" });
        const [busy, setBusy] = useState(false);
        const [error, setError] = useState(null);

        async function create(e) {
          e.preventDefault();
          setBusy(true); setError(null);
          try {
            await api("POST", "/api/users", {
              name: form.name,
              zip: form.zip,
              country: form.country || undefined,
            });
            setForm({ name: "", zip: "", country: "" });
            onChanged();
          } catch (err) { setError(err.message); } finally { setBusy(false); }
        }

        return html`
          <div className="wrap">
            <header>
              <h1>RentRedi Users</h1>
              <span className=${"badge" + (source === "live" ? " live" : "")}>
                ${source === "live" ? "Live · Firebase RTDB (ReactFire)" : "API polling"}
              </span>
            </header>

            <form className="create" onSubmit=${create}>
              <input placeholder="Name" value=${form.name} onChange=${(e) => setForm({ ...form, name: e.target.value })} required />
              <input placeholder="ZIP (e.g. 78701)" value=${form.zip} onChange=${(e) => setForm({ ...form, zip: e.target.value })} required />
              <input placeholder="Country (US)" value=${form.country} onChange=${(e) => setForm({ ...form, country: e.target.value })} />
              <button type="submit" disabled=${busy}>${busy ? "Adding…" : "Add user"}</button>
            </form>

            ${error && html`<div className="error">${error}</div>`}

            ${users.length === 0
              ? html`<div className="empty">No users yet. Add one above.</div>`
              : html`<div className="grid">
                  ${users.map((u) => html`<${UserCard} key=${u.id} user=${u} onChanged=${onChanged} />`)}
                </div>`}
          </div>`;
      }

      // --- data source A: API polling (default, no Firebase needed) ---------

      function PolledUsers() {
        const [users, setUsers] = useState([]);
        const load = useCallback(async () => {
          try { const json = await api("GET", "/api/users"); setUsers(json.data); }
          catch { /* transient; next tick retries */ }
        }, []);
        useEffect(() => {
          load();
          const t = setInterval(load, 5000);
          return () => clearInterval(t);
        }, [load]);
        return html`<${UserManager} users=${users} source="poll" onChanged=${load} />`;
      }

      // --- data source B: ReactFire live Realtime Database subscription -----
      // Modules are dynamically imported only when Firebase is configured, so
      // the default (polling) path never loads the Firebase SDK.
      let RF = null, FDB = null;
      async function loadFirebase() {
        if (!RF) [RF, FDB] = await Promise.all([import("reactfire"), import("firebase/database")]);
      }

      function LiveUsers() {
        const database = RF.useDatabase();
        const { status, data } = RF.useDatabaseListData(FDB.ref(database, "users"), { idField: "id" });
        if (status === "loading") return html`<div className="wrap"><p>Loading users…</p></div>`;
        // Live reads via RTDB; writes still go through the API (server owns
        // location enrichment + input validation), and RTDB pushes the update back.
        return html`<${UserManager} users=${data || []} source="live" onChanged=${() => {}} />`;
      }

      function LiveRoot({ config }) {
        const DbBridge = () => {
          const app = RF.useFirebaseApp();
          return html`<${RF.DatabaseProvider} sdk=${FDB.getDatabase(app)}><${LiveUsers} /><//>`;
        };
        return html`<${RF.FirebaseAppProvider} firebaseConfig=${config}><${DbBridge} /><//>`;
      }

      // --- boot ------------------------------------------------------------

      function App() {
        const [state, setState] = useState({ loading: true });
        useEffect(() => {
          (async () => {
            try {
              const res = await fetch("/api/config");
              const { firebase } = await res.json();
              if (firebase) { await loadFirebase(); setState({ loading: false, firebase }); }
              else setState({ loading: false, firebase: null });
            } catch {
              setState({ loading: false, firebase: null });
            }
          })();
        }, []);

        if (state.loading) return html`<div className="wrap"><p>Loading…</p></div>`;
        return state.firebase
          ? html`<${LiveRoot} config=${state.firebase} />`
          : html`<${PolledUsers} />`;
      }

      createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
